# Echo taskflow using the Responses API with MCP tool calls.

seclab-taskflow-agent:
  version: "1.0"
  filetype: taskflow

model_config: examples.model_configs.responses_api

taskflow:
  - task:
      max_steps: 5
      must_complete: true
      agents:
        - examples.personalities.echo
      model: gpt_responses
      user_prompt: |
        Hello from the Responses API
